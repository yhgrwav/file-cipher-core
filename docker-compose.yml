services:
  key-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${KEY_DB_USER}
      POSTGRES_PASSWORD: ${KEY_DB_PASS}
      POSTGRES_DB: ${KEY_DB_NAME}
    ports:
      - "5433:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${KEY_DB_USER} -d ${KEY_DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 10

  data-db:
    image: postgres:16
    environment:
      POSTGRES_USER: ${DATA_DB_USER}
      POSTGRES_PASSWORD: ${DATA_DB_PASS}
      POSTGRES_DB: ${DATA_DB_NAME}
    ports:
      - "5434:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DATA_DB_USER} -d ${DATA_DB_NAME}"]
      interval: 3s
      timeout: 3s
      retries: 10

  redis:
    image: redis:7
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 3s
      timeout: 3s
      retries: 10

  migrate-keys:
    image: migrate/migrate:latest
    depends_on:
      key-db:
        condition: service_healthy
    volumes:
      - ./migrations/keys:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${KEY_DB_USER}:${KEY_DB_PASS}@key-db:5432/${KEY_DB_NAME}?sslmode=disable"
      - "up"

  migrate-data:
    image: migrate/migrate:latest
    depends_on:
      data-db:
        condition: service_healthy
    volumes:
      - ./migrations/data:/migrations
    command:
      - "-path=/migrations"
      - "-database=postgres://${DATA_DB_USER}:${DATA_DB_PASS}@data-db:5432/${DATA_DB_NAME}?sslmode=disable"
      - "up"

  app:
    build:
      context: .
      dockerfile: Dockerfile
    env_file: .env
    environment:
      KEY_DB_HOST: key-db
      KEY_DB_PORT: "5432"
      DATA_DB_HOST: data-db
      DATA_DB_PORT: "5432"
      REDIS_ADDR: redis:6379
    ports:
      - "8080:8080"
    depends_on:
      migrate-keys:
        condition: service_completed_successfully
      migrate-data:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
